<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Al‑Mushannif</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body class="auth-page theme-light">
  <div class="auth-container">
    <div class="card glass login-card">
      <h2>Masuk</h2>
      <p>Gunakan akun Google untuk masuk.</p>

      <!-- Google Identity Services button will render here -->
      <div id="g_id_signin"></div>

      <p class="muted">Atau <a href="/">Kembali ke Beranda</a></p>
    </div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="/assets/js/config.js"></script>
  <script type="module" src="/assets/js/auth.js"></script>
</body>
</html>
