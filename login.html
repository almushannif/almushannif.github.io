<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Edutech Nusantara Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0B6E4F; }
    body { 
      margin: 0; font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg, #0B6E4F 0%, #2ecc71 100%);
      height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px; border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 100%; max-width: 400px; text-align: center;
    }
    h2 { color: var(--primary); margin-bottom: 25px; }
    .input-group { text-align: left; margin-bottom: 15px; }
    input { 
      width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd;
      border-radius: 8px; box-sizing: border-box; outline: none;
    }
    button {
      width: 100%; padding: 12px; background: var(--primary);
      color: white; border: none; border-radius: 8px;
      margin-top: 20px; cursor: pointer; font-weight: 600;
      transition: 0.3s;
    }
    button:hover { background: #085a40; }
    .footer-text { margin-top: 20px; font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>Masuk Santri/Wali</h2>
    <form id="loginForm">
      <div class="input-group">
        <label>NIS / Username</label>
        <input type="text" id="username" required placeholder="Masukkan NIS atau Email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit">Login Sekarang</button>
    </form>
    <div class="footer-text">
      Edutech Nusantara Digital © 2026
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      // Simulasi validasi (Ganti dengan logika autentikasi API Anda)
      if(user === "admin" && pass === "12345") {
        alert("Login Berhasil! Selamat Datang.");
        window.location.href = "dashboard.html"; // Arahkan ke dashboard
      } else {
        alert("Username atau Password salah!");
      }
    });
  </script>
</body>
</html>
