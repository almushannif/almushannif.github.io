<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PPDB Pondok Pesantren Al-Mushannif 2026">
  <title>PPDB | Pondok Pesantren Al-Mushannif</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Preloader -->
  <div id="preloader" class="preloader d-flex justify-content-center align-items-center">
    <div class="loader">
      <div class="spinner-border text-success" role="status"></div>
      <div class="mt-3 text-dark small">Memuat PPDB...</div>
    </div>
  </div>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <main class="py-6">
    <div class="container">
      <div class="text-center mb-5" data-aos="fade-up">
        <img src="https://almushannif.ponpes.id/assets/logo.svg" alt="Logo" width="80" height="80" class="mb-3" loading="lazy" />
        <h1 class="fw-bold">PPDB 2026</h1>
        <p class="text-muted">Pendaftaran Peserta Didik Baru Pondok Pesantren Al-Mushannif</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm p-5">
            <h4 class="fw-bold mb-4">Formulir Pendaftaran</h4>
            <form id="ppdbForm" class="needs-validation" novalidate>
              <div class="mb-3">
                <label class="form-label fw-semibold">Nama Calon Santri</label>
                <input type="text" class="form-control" name="nama" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Nomor Telepon</label>
                <input type="tel" class="form-control" name="telepon" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Program Pendidikan</label>
                <select class="form-select" name="program" required>
                  <option selected disabled>Pilih Program</option>
                  <option>Tahfidz Al-Qur'an</option>
                  <option>Madrasah Diniyah</option>
                  <option>Komputer & Life Skill</option>
                  <option>RA Al-Mushannif</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success btn-lg w-100">Daftar Sekarang</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script type="module" src="/assets/js/config.js"></script>
  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
