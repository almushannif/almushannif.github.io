<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — Al‑Mushannif</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root { --sidebar-width: 260px; --primary: #0B6E4F; --bg: #f4f7f6; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; }

    /* Sidebar */
    .sidebar { width: var(--sidebar-width); height: 100vh; background: #fff; position: fixed; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 100; transition: 0.3s; }
    .sidebar-header { padding: 20px; font-weight: 700; color: var(--primary); font-size: 1.2rem; border-bottom: 1px solid #eee; }
    .menu-item { padding: 15px 20px; display: block; color: #666; text-decoration: none; transition: 0.2s; }
    .menu-item:hover, .menu-item.active { background: #e8f5e9; color: var(--primary); border-right: 4px solid var(--primary); }

    /* Main Content */
    .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 25px; }
    
    /* Cards */
    .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; background: #fff; }
    .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
    
    /* Stats Grid */
    .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .stat-card { display: flex; align-items: center; gap: 15px; padding: 20px; border-radius: 15px; color: white; }

    @media (max-width: 768px) {
      .sidebar { width: 0; overflow: hidden; }
      .main-content { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">Al-Mushannif Admin</div>
    <div id="menu-list">
      <!-- Menu mudah ditambah di sini -->
      <a href="#" class="menu-item active"><i class="fa fa-chart-line me-2"></i> Dashboard</a>
      <a href="#" class="menu-item"><i class="fa fa-users me-2"></i> Data Santri</a>
      <a href="#" class="menu-item"><i class="fa fa-book me-2"></i> Akademik</a>
      <a href="#" class="menu-item"><i class="fa fa-money-bill me-2"></i> Keuangan</a>
      <a href="#" class="menu-item"><i class="fa fa-cog me-2"></i> Pengaturan</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold">Selamat Datang, Admin</h4>
      <button class="btn btn-success" onclick="tambahMenu()"><i class="fa fa-plus"></i> Tambah Menu</button>
    </header>

    <!-- Stats Area -->
    <div class="grid-stats mb-4">
      <div class="stat-card bg-primary"> <i class="fa fa-user-graduate fa-2x"></i> <div><h5>520</h5>Santri</div> </div>
      <div class="stat-card bg-warning"> <i class="fa fa-chalkboard-user fa-2x"></i> <div><h5>45</h5>Guru</div> </div>
      <div class="stat-card bg-info"> <i class="fa fa-file-alt fa-2x"></i> <div><h5>12</h5>Berita</div> </div>
    </div>

    <!-- Chart & Summary -->
    <div class="row">
      <div class="col-lg-8">
        <div class="card">
          <h5 class="mb-3">Statistik Santri</h5>
          <canvas id="chart-stats" height="100"></canvas>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card">
          <h5>Ringkasan</h5>
          <div id="summary-cards"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Fungsi dinamis tambah menu
    function tambahMenu() {
      Swal.fire({
        title: 'Tambah Menu Baru',
        input: 'text',
        inputLabel: 'Nama Menu',
        showCancelButton: true,
        confirmButtonText: 'Tambah'
      }).then((result) => {
        if (result.isConfirmed) {
          const menuList = document.getElementById('menu-list');
          const newMenu = document.createElement('a');
          newMenu.className = 'menu-item';
          newMenu.innerHTML = `<i class="fa fa-link me-2"></i> ${result.value}`;
          menuList.appendChild(newMenu);
        }
      });
    }

    // Chart Init
    const ctx = document.getElementById('chart-stats').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr'],
        datasets: [{ label: 'Santri Baru', data: [12, 19, 3, 5], borderColor: '#0B6E4F', tension: 0.4 }]
      }
    });
  </script>
</body>
</html>
