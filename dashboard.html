<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — Edutech Nusantara Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --primary: #0B6E4F;
      --sidebar-width: 260px;
      --sidebar-collapsed: 70px;
      --bg: #f4f7f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: var(--bg); display: flex; min-height: 100vh; }

    /* Sidebar */
    #sidebar { width: var(--sidebar-width); background: #2c3e50; color: white; transition: 0.3s; padding: 20px; position: fixed; height: 100%; z-index: 100; }
    #sidebar.collapsed { width: var(--sidebar-collapsed); }
    #sidebar.collapsed .menu-text { display: none; }
    .brand { font-size: 1.2rem; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; color: #2ecc71; }
    .nav-item { padding: 15px 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-radius: 8px; transition: 0.2s; }
    .nav-item:hover { background: rgba(255,255,255,0.1); }

    /* Main Content */
    #main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); transition: 0.3s; padding: 20px; }
    #main-content.expanded { margin-left: var(--sidebar-collapsed); width: calc(100% - var(--sidebar-collapsed)); }
    
    /* Navbar */
    .topbar { background: white; padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
    
    /* Grid Layout */
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

    /* Utilities */
    .btn-toggle { cursor: pointer; background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; }
  </style>
</head>
<body>

  <nav id="sidebar">
    <div class="brand"><i class="fa-solid fa-graduation-cap"></i> <span class="menu-text">Edutech Nusantara</span></div>
    <div class="nav-item"><i class="fa-solid fa-house"></i> <span class="menu-text">Dashboard</span></div>
    <div class="nav-item"><i class="fa-solid fa-user-graduate"></i> <span class="menu-text">Data Santri</span></div>
    <div class="nav-item"><i class="fa-solid fa-book"></i> <span class="menu-text">Kurikulum</span></div>
    <div class="nav-item"><i class="fa-solid fa-gear"></i> <span class="menu-text">Pengaturan</span></div>
  </nav>

  <main id="main-content">
    <div class="topbar">
      <button class="btn-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div style="font-weight: 600;">Selamat Datang, Admin</div>
    </div>

    <section class="dashboard-grid">
      <div class="card">
        <h3>Statistik Santri</h3>
        <canvas id="myChart" height="200"></canvas>
      </div>
      <div class="card">
        <h3>Ringkasan Aktivitas</h3>
        <p>Pendaftaran Baru: 12</p>
        <p>Kelas Aktif: 8</p>
        <p>Guru Bertugas: 24</p>
      </div>
    </section>
  </main>

  <script>
    // Sidebar Logic
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('main-content').classList.toggle('expanded');
    }

    // Chart Logic
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr'],
        datasets: [{ label: 'Santri Baru', data: [12, 19, 3, 5], backgroundColor: '#0B6E4F' }]
      }
    });
  </script>
</body>
</html>
